<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner Redes Sociales</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      --banner-radius: 1.45rem;
      --transition-speed: 680ms;
    }

    * {
      box-sizing: border-box;
    }

    /* TRANSPARENCIA TOTAL PARA TIKTOK STUDIO */
    html, body {
      width: 100%;
      margin: 0;
      padding: 0;
      background: transparent !important;
      background-color: transparent !important;
      overflow: hidden;
    }

    body {
      font-family: "DM Sans", sans-serif;
    }

    .banner-shell {
      position: relative;
      width: min(100%, 48rem);
      margin: 0 auto;
      isolation: isolate;
      animation: bannerArrival 850ms cubic-bezier(.2, .85, .25, 1) both;
    }

    .banner-frame {
      position: relative;
      min-height: 8.2rem;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: var(--banner-radius);
      background: linear-gradient(115deg, rgba(8, 10, 18, .97), rgba(18, 20, 32, .94));
      box-shadow:
        0 22px 60px rgba(0, 0, 0, .38),
        inset 0 1px 0 rgba(255, 255, 255, .08);
      backdrop-filter: blur(18px);
    }

    .banner-frame::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(100deg, rgba(255,255,255,.06), transparent 32%),
        repeating-linear-gradient(135deg, transparent 0 18px, rgba(255,255,255,.018) 18px 19px);
    }

    .accent-rail {
      position: absolute;
      inset: 0 auto 0 0;
      width: .38rem;
      background: #ff003c;
      box-shadow: 0 0 24px currentColor;
      transition: background 450ms ease;
    }

    .slides-viewport {
      position: relative;
      min-height: 8.2rem;
    }

    .social-slide {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: clamp(.85rem, 2.5vw, 1.35rem);
      padding: 1.2rem clamp(4.3rem, 9vw, 5.8rem) 1.2rem clamp(1.35rem, 4vw, 2rem);
      opacity: 0;
      visibility: hidden;
      transform: translateY(22px) scale(.975);
      filter: blur(8px);
      transition:
        opacity var(--transition-speed) ease,
        transform var(--transition-speed) cubic-bezier(.2, .8, .2, 1),
        filter var(--transition-speed) ease,
        visibility 0s linear var(--transition-speed);
    }

    .social-slide.is-active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
      filter: blur(0);
      transition-delay: 0s;
    }

    .social-slide.is-leaving {
      transform: translateY(-22px) scale(.975);
    }

    .icon-tile {
      position: relative;
      width: clamp(4.2rem, 12vw, 5.2rem);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      flex: none;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 1.15rem;
      color: white;
      box-shadow:
        0 14px 30px rgba(0,0,0,.25),
        inset 0 1px 1px rgba(255,255,255,.2);
      overflow: hidden;
    }

    .icon-tile::after {
      content: "";
      position: absolute;
      width: 70%;
      height: 140%;
      top: -90%;
      left: -80%;
      background: rgba(255,255,255,.28);
      transform: rotate(28deg);
      animation: iconShine 4s ease-in-out infinite;
    }

    .icon-tile svg {
      width: 52%;
      height: 52%;
      stroke-width: 2.2;
      position: relative;
      z-index: 1;
    }

    .youtube-icon { background: linear-gradient(145deg, #ff164f, #b9002d); }
    .twitch-icon { background: linear-gradient(145deg, #a970ff, #5f20bd); }
    .tiktok-icon { background: linear-gradient(145deg, #17202a, #050608); }

    .slide-copy { min-width: 0; }

    .eyebrow-row {
      display: flex;
      align-items: center;
      gap: .55rem;
      margin-bottom: .22rem;
    }

    .live-dot {
      width: .48rem;
      height: .48rem;
      flex: none;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 0 0 0 0 currentColor;
      animation: pulseDot 1.8s ease-out infinite;
    }

    .network-name { text-transform: uppercase; }
    .handle { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.06; }
    .cta { margin-top: .34rem; line-height: 1.3; }

    .corner-mark {
      position: absolute;
      top: 1rem;
      right: 1.1rem;
      display: flex;
      align-items: center;
      gap: .35rem;
      color: rgba(255,255,255,.5);
      pointer-events: none;
    }

    .corner-mark::before,
    .corner-mark::after {
      content: "";
      display: block;
      height: 1px;
      background: currentColor;
    }

    .corner-mark::before { width: 1.3rem; }
    .corner-mark::after { width: .35rem; }

    @keyframes bannerArrival {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes iconShine {
      0%, 100% { top: -90%; left: -80%; }
      50% { top: 120%; left: 120%; }
    }

    @keyframes pulseDot {
      0% { box-shadow: 0 0 0 0 rgba(255,255,255, 0.7); }
      70% { box-shadow: 0 0 0 6px rgba(255,255,255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255,255,255, 0); }
    }
  </style>
</head>
<body>

  <div class="banner-shell">
    <div class="banner-frame">
      <div class="accent-rail" id="railColor" style="color: #ff003c; background: #ff003c;"></div>
      
      <div class="slides-viewport">
        
        <!-- Slide YouTube -->
        <div class="social-slide is-active" id="slide-0" data-color="#ff003c">
          <div class="icon-tile youtube-icon">
            <i class="lucide" data-lucide="youtube"></i>
          </div>
          <div class="slide-copy text-white">
            <div class="eyebrow-row text-xs font-bold tracking-widest text-red-400">
              <span class="live-dot"></span>
              <span class="network-name">YouTube</span>
            </div>
            <h2 class="handle text-2xl font-extrabold tracking-tight">Dankirius</h2>
            <p class="cta text-sm text-gray-300 font-medium">¡Nuevos videos todas las semanas!</p>
          </div>
        </div>

        <!-- Slide Twitch -->
        <div class="social-slide" id="slide-1" data-color="#9146ff">
          <div class="icon-tile twitch-icon">
            <i class="lucide" data-lucide="twitch"></i>
          </div>
          <div class="slide-copy text-white">
            <div class="eyebrow-row text-xs font-bold tracking-widest text-purple-400">
              <span class="live-dot"></span>
              <span class="network-name">Twitch</span>
            </div>
            <h2 class="handle text-2xl font-extrabold tracking-tight">Dankirius</h2>
            <p class="cta text-sm text-gray-300 font-medium">En vivo de Jueves y Viernes</p>
          </div>
        </div>

        <!-- Slide TikTok -->
        <div class="social-slide" id="slide-2" data-color="#25f4ee">
          <div class="icon-tile tiktok-icon">
            <i class="lucide" data-lucide="music-2"></i>
          </div>
          <div class="slide-copy text-white">
            <div class="eyebrow-row text-xs font-bold tracking-widest text-cyan-400">
              <span class="live-dot"></span>
              <span class="network-name">TikTok</span>
            </div>
            <h2 class="handle text-2xl font-extrabold tracking-tight">@Dankirius</h2>
            <p class="cta text-sm text-gray-300 font-medium">Contenido diario exclusivo</p>
          </div>
        </div>

      </div>

      <div class="corner-mark text-xs font-mono">LIVE</div>
    </div>
  </div>

  <script>
    // Inicialización de la librería de iconos Lucide original
    lucide.createIcons();

    const slides = document.querySelectorAll('.social-slide');
    const rail = document.getElementById('railColor');
    let currentIdx = 0;
    const slideDuration = 4000; // Rotación automática cada 4 segundos

    function rotateSlides() {
      const currentSlide = slides[currentIdx];
      currentSlide.classList.remove('is-active');
      currentSlide.classList.add('is-leaving');

      setTimeout(() => {
        currentSlide.classList.remove('is-leaving');
      }, 680);

      currentIdx = (currentIdx + 1) % slides.length;
      
      const nextSlide = slides[currentIdx];
      nextSlide.classList.add('is-active');

      const nextColor = nextSlide.getAttribute('data-color');
      rail.style.backgroundColor = nextColor;
      rail.style.color = nextColor;
    }

    setInterval(rotateSlides, slideDuration);
  </script>
</body>
</html>
